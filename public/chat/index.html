<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Безопасний чат з реальним часом">
  <meta name="theme-color" content="#1a1a2e">
  <title>Secure Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="../img/favicon.ico" />
</head>
<body>
  <div class="app">
    <!-- Экран авторизации -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </div>
          <h1>Secure Chat</h1>
        </div>
        
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Вхід</button>
          <button class="auth-tab" data-tab="register">Реєстрація</button>
        </div>
        
        <!-- Форма входа -->
        <form id="login-form" class="auth-form">
          <div class="form-group">
            <label for="login-username">Ім'я користувача</label>
            <input type="text" id="login-username" name="username" required 
                   autocomplete="username" placeholder="Введіть ім'я">
          </div>
          <div class="form-group">
            <label for="login-password">Пароль</label>
            <input type="password" id="login-password" name="password" required 
                   autocomplete="current-password" placeholder="Введіть пароль">
          </div>
          <button type="submit" class="btn btn-primary">
            <span>Увійти</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"></path>
            </svg>
          </button>
        </form>
        
        <!-- Форма регистрации -->
        <form id="register-form" class="auth-form hidden">
          <div class="form-group">
            <label for="register-username">Ім'я користувача</label>
            <input type="text" id="register-username" name="username" required 
                   minlength="3" maxlength="20" autocomplete="username" 
                   placeholder="Від 3 до 20 символів">
          </div>
          <div class="form-group">
            <label for="register-password">Пароль</label>
            <input type="password" id="register-password" name="password" required 
                   minlength="6" autocomplete="new-password" placeholder="Мінімум 6 символів">
          </div>
          <div class="form-group">
            <label for="register-confirm">Підтвердження пароля</label>
            <input type="password" id="register-confirm" name="confirm" required 
                   minlength="6" autocomplete="new-password" placeholder="Повторіть пароль">
          </div>
          <button type="submit" class="btn btn-primary">
            <span>Зареєструватися</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="8.5" cy="7" r="4"></circle>
              <line x1="20" y1="8" x2="20" y2="14"></line>
              <line x1="23" y1="11" x2="17" y2="11"></line>
            </svg>
          </button>
        </form>
        
        <div id="auth-error" class="error-message hidden"></div>
      </div>
    </div>
    
    <!-- Экран чата -->
    <div id="chat-screen" class="screen">
      <header class="chat-header">
        <div class="header-left">
          <button id="menu-toggle" class="icon-btn mobile-only">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div class="chat-info">
            <h2>Загальний чат</h2>
            <span class="online-count"><span class="online-dot"></span> <span id="online-count">0</span> онлайн</span>
          </div>
        </div>
        <div class="header-right">
          <button id="logout-btn" class="icon-btn" title="Вийти">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </header>
      
      <div class="chat-container">
        <!-- Боковая панель (только для ПК или открыта на мобиле) -->
        <aside id="users-sidebar" class="users-sidebar">
          <div class="sidebar-header">
            <h3>Учасники</h3>
          </div>
          <div id="users-list" class="users-list">
            <!-- Список пользователей -->
          </div>
        </aside>
        
        <!-- Область сообщений -->
        <main class="messages-area">
          <div id="messages" class="messages">
            <!-- Сообщения -->
          </div>
          
          <form id="message-form" class="message-form">
            <button type="button" id="emoji-btn" class="icon-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                <line x1="9" y1="9" x2="9.01" y2="9"></line>
                <line x1="15" y1="9" x2="15.01" y2="9"></line>
              </svg>
            </button>
            <input type="text" id="message-input" placeholder="Введіть повідомлення..." 
                   autocomplete="off" maxlength="1000">
            <button type="submit" class="send-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </form>
        </main>
      </div>
    </div>
    
    <!-- Уведомления -->
    <div id="toast-container" class="toast-container"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
